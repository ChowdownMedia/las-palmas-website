name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Publish to las-palmas-website.pages.dev
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Deploy with wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # LiveWire account (chuckp@livewiremediapartners.com)
          accountId: c0389c6a083ab395f1edc51707925292
          command: pages deploy . --project-name=las-palmas-website --branch=main
