name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  # Node 20 actions are deprecated; runners force Node 24 from 2026-06-16.
  # Opt in early so we know it works before the forced switch.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Publish to las-palmas-website.pages.dev
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Deploy with wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # LiveWire account (chuckp@livewiremediapartners.com)
          accountId: c0389c6a083ab395f1edc51707925292
          command: pages deploy . --project-name=las-palmas-website --branch=main
