.lp-root {
  --bg: #f7efe2;
  --surface: #fff4df;
  --surface-soft: #f3dfbd;
  --text: #3d2016;
  --muted: #7b5b45;
  --gold: #d3a647;
  --gold-soft: #e8c878;
  --terracotta: #c9482c;
  --terracotta-dark: #8f2c1d;
  --green: #6f7f36;
  --red: #b93225;
  --border: rgba(120, 75, 35, 0.18);
  --shadow-card: 0 1px 2px rgba(60, 30, 15, 0.05), 0 12px 28px -12px rgba(60, 30, 15, 0.18);
  --shadow-pop: 0 2px 6px rgba(60, 30, 15, 0.08), 0 24px 48px -16px rgba(60, 30, 15, 0.22);
  --radius-card: 22px;
  --radius-pill: 999px;
  font-family: 'DM Sans', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  color: var(--text);
  background: var(--bg);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
html[data-ev-theme="dark"] .lp-root {
  --bg: #160c08;
  --surface: #24140e;
  --surface-soft: #321d13;
  --text: #f4e3c4;
  --muted: #c5a987;
  --gold: #d3a647;
  --gold-soft: #b78a36;
  --terracotta: #d45a35;
  --terracotta-dark: #a33a22;
  --green: #8fa85a;
  --red: #d24c35;
  --border: rgba(211, 166, 71, 0.22);
  --shadow-card: 0 1px 2px rgba(0, 0, 0, 0.35), 0 16px 40px -14px rgba(0, 0, 0, 0.55);
  --shadow-pop: 0 2px 8px rgba(0, 0, 0, 0.45), 0 28px 60px -18px rgba(0, 0, 0, 0.65);
}
html, body { margin: 0; padding: 0; background: #f7efe2; }
html[data-ev-theme="dark"] body { background: #160c08; }

.lp-root::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image: radial-gradient(circle at center, rgba(120, 75, 35, 0.07) 1px, transparent 1.4px);
  background-size: 22px 22px;
  opacity: 0.6;
  z-index: 0;
}
html[data-ev-theme="dark"] .lp-root::before {

}
.lp-root > * { position: relative; z-index: 1; }

.lp-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 14px 18px;
  max-width: 760px;
  margin: 0 auto;
}
.lp-home-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 9px 14px;
  border-radius: var(--radius-pill);
  background: var(--surface);
  color: var(--text);
  text-decoration: none;
  font-size: 14px;
  font-weight: 600;
  border: 1px solid var(--border);
  box-shadow: var(--shadow-card);
  transition: transform 0.15s ease, background-color 0.2s ease;
}
.lp-home-btn:hover { background: var(--surface-soft); }
.lp-home-btn:active { transform: translateY(1px); }
.lp-header__brand { display: flex; flex-direction: column; align-items: center; line-height: 1; }
.lp-header__brand-eyebrow {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 2px;
}
.lp-header__brand-mark {
  font-family: 'Instrument Serif', Georgia, serif;
  font-style: italic;
  font-size: 22px;
  color: var(--terracotta);
}
.lp-theme-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 40px;
  height: 40px;
  border-radius: var(--radius-pill);
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
  cursor: pointer;
  box-shadow: var(--shadow-card);
  transition: background-color 0.2s ease, transform 0.15s ease;
}
.lp-theme-btn:hover { background: var(--surface-soft); }
.lp-theme-btn:active { transform: translateY(1px); }
html[data-ev-theme="light"] .lp-ico-sun { display: none; }

.lp-main { max-width: 720px; margin: 0 auto; padding: 12px 18px 32px; }
.lp-hero { text-align: center; padding: 14px 0 26px; }
.lp-hero__eyebrow {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--terracotta);
  margin-bottom: 8px;
}
.lp-hero__title {
  font-family: 'Instrument Serif', Georgia, serif;
  font-style: italic;
  font-size: clamp(48px, 12vw, 72px);

  margin: 0 0 12px;
  color: var(--text);
  letter-spacing: -0.01em;
}
.lp-hero__copy {
  font-size: 15px;
  line-height: 1.55;
  color: var(--muted);
  margin: 0 auto;
  max-width: 460px;
}

.lp-list { display: flex; flex-direction: column; gap: 22px; }
.lp-event-card {
  background: var(--surface);
  border-radius: var(--radius-card);
  border: 1px solid var(--border);
  overflow: hidden;
  box-shadow: var(--shadow-card);
  animation: lpFadeUp 0.5s ease both;
}
@keyframes lpFadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.lp-event-card__media {
  position: relative;
  aspect-ratio: 4 / 3;
  background: var(--surface-soft);
  overflow: hidden;
}
.lp-event-image { position: absolute; inset: 0; }
.lp-event-image img, .lp-event-image svg {
  width: 100%;
  height: 100%;
  display: block;
  object-fit: cover;
}
.lp-date-badge {
  position: absolute;
  top: 14px;
  left: 14px;
  min-width: 60px;
  padding: 8px 12px 10px;
  background: var(--surface);
  color: var(--text);
  border-radius: 14px;
  box-shadow: var(--shadow-pop);
  text-align: center;
  border: 1px solid var(--border);
  line-height: 1;
}
.lp-date-badge__month {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--terracotta);
  margin-bottom: 4px;
}
.lp-date-badge__day {
  font-family: 'Instrument Serif', Georgia, serif;
  font-size: 28px;
  font-weight: 400;
  color: var(--text);
  line-height: 1;
}
.lp-date-badge__rule {
  width: 18px;
  height: 2px;
  background: var(--gold);
  border-radius: 2px;
  margin: 6px auto 0;
}
.lp-event-card__body { padding: 18px 20px 20px; }
.lp-event-card__badges { display: flex; gap: 6px; margin-bottom: 8px; min-height: 22px; }
.lp-status {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  border-radius: var(--radius-pill);
}
.lp-status--today { background: var(--terracotta); color: #fff4df; }
.lp-status--soon { background: transparent; color: var(--terracotta); border: 1.5px solid var(--gold); }
.lp-event-card__title {
  font-family: 'Instrument Serif', Georgia, serif;
  font-size: 28px;
  font-style: italic;
  line-height: 1.15;
  margin: 0 0 6px;
  color: var(--text);
  letter-spacing: -0.005em;
}
.lp-event-card__date {
  font-size: 13px;
  font-weight: 500;
  color: var(--terracotta);
  margin: 0 0 12px;
  letter-spacing: 0.3px;
}
.lp-event-card__desc {
  font-size: 15px;
  line-height: 1.55;
  color: var(--text);
  margin: 0 0 14px;
  white-space: pre-wrap;
}
.lp-event-card__locations {
  display: inline-block;
  padding: 6px 12px;
  background: var(--surface-soft);
  color: var(--text);
  font-size: 13px;
  font-weight: 600;
  border-radius: var(--radius-pill);
  border: 1px solid var(--border);
}

.lp-footer { max-width: 720px; margin: 0 auto; padding: 32px 18px 40px; text-align: center; }
.lp-thank-you {
  font-family: 'Instrument Serif', Georgia, serif;
  font-style: italic;
  font-size: 18px;
  color: var(--muted);
  padding: 8px 16px;
  user-select: none;
}
.lp-footer__copy { margin-top: 8px; font-size: 12px; color: var(--muted); letter-spacing: 0.3px; }

@media (prefers-reduced-motion: reduce) {
  .lp-event-card { animation: none; }
}

  function esc(s){var t=d.createElement('span');t.textContent=s==null?'':String(s);return t.innerHTML;}
  function fallbackArt(i){return ART_TEMPLATE.split('__ID__').join('fbGrad'+(i%3+1));}
  function parseYMD(s){var p=String(s).split('-');return new Date(+p[0],+p[1]-1,+p[2]);}
  function daysUntil(dt){var t=new Date();t.setHours(0,0,0,0);return Math.round((dt-t)/86400000);}
  function readableLocations(locs){
    if(!locs||!locs.length)return 'All Las Palmas locations';
    return (locs.length===1?'Location: ':'Locations: ')+locs.join(', ');
  }
  function renderEvents(events){

        '<p style="margin:0">Check back soon — new Las Palmas events will appear here.</p></div>';
      return;
    }
    var htmlOut='';
    events.forEach(function(ev,i){
      var dt=parseYMD(ev.date);
      var du=daysUntil(dt);
      var badge=du===0?'<span class="lp-status lp-status--today">Today</span>':(du>0&&du<=COMING_SOON_DAYS?'<span class="lp-status lp-status--soon">Coming Soon</span>':'');

        '<div class="lp-event-card__media"><div class="lp-event-image">'+(ev.image?('<img src="'+esc(ev.image)+'" alt="'+esc(ev.title)+'" loading="lazy">'):fallbackArt(i))+'</div>'+

        '<div class="lp-date-badge__day">'+dt.getDate()+'</div><div class="lp-date-badge__rule"></div></div></div>'+
        '<div class="lp-event-card__body"><div class="lp-event-card__badges">'+badge+'</div>'+
        '<h2 class="lp-event-card__title">'+esc(ev.title)+'</h2>'+
        '<p class="lp-event-card__date">'+WEEKDAYS[dt.getDay()]+', '+MONTH_FULL[dt.getMonth()]+' '+dt.getDate()+', '+dt.getFullYear()+'</p>'+
        '<p class="lp-event-card__desc">'+esc(ev.description)+'</p>'+
        '<div class="lp-event-card__locations">'+esc(readableLocations(ev.locations))+'</div></div></article>';
    });
    list.innerHTML=htmlOut;
  }
  d.getElementById('lp-list').innerHTML='<div class="lp-empty" style="text-align:center;padding:48px 20px;color:var(--muted)">Loading events…</div>';
  fetch('/api/events').then(function(r){return r.json();}).then(function(j){renderEvents(j.events||[]);}).catch(function(){renderEvents([]);});
})();
</script>
</body>
</html>
