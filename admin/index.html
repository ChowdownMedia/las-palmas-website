<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Back Office — Las Palmas Mexican Restaurant</title>
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#160C08">

<link rel="preload" href="/assets/fonts/instrument-serif.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="/assets/fonts/dm-sans-var.woff2" as="font" type="font/woff2" crossorigin>

<style>
@font-face{font-family:'Instrument Serif';src:url('/assets/fonts/instrument-serif.woff2') format('woff2');font-weight:400;font-style:normal;font-display:swap}
@font-face{font-family:'DM Sans';src:url('/assets/fonts/dm-sans-var.woff2') format('woff2');font-weight:100 1000;font-style:normal;font-display:swap}

/* ── Shared Las Palmas palette (dark back office) ── */
:root{
  --bg:#160C08; --surface:#24140E; --surface-soft:#2E1B13; --surface-deep:#38241A;
  --text:#F4E3C4; --text-strong:#FAEDD0; --muted:#C5A987; --soft:#9A7E62;
  --gold:#D3A647; --gold-deep:#E1B85A; --on-gold:#2A140C;
  --terracotta:#D45A35; --terracotta-deep:#A33A22; --on-terracotta:#FFF8EC;
  --green:#5FAE7E;
  --border:rgba(211,166,71,0.22); --border-soft:rgba(211,166,71,0.13);
  --shadow:0 2px 6px rgba(0,0,0,0.45),0 14px 32px rgba(0,0,0,0.55);
  --font-display:'Instrument Serif','Playfair Display',Georgia,serif;
  --font-body:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased;min-height:100vh}
[hidden]{display:none!important}
button{font-family:inherit}

/* ── Login ── */
.lpa-login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.lpa-login-card{width:100%;max-width:380px;background:var(--surface);border:1px solid var(--border);border-radius:20px;box-shadow:var(--shadow);padding:30px 26px;text-align:center}
.lpa-login-mark{margin:0 auto 14px}
.lpa-login-kicker{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin:0 0 6px}
.lpa-login-title{font-family:var(--font-display);font-size:30px;line-height:1.1;color:var(--text-strong);margin:0 0 20px}
.lpa-login-field{text-align:left;margin-bottom:14px}
.lpa-login-field label{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--soft);margin-bottom:6px}
.lpa-input{width:100%;padding:13px 15px;background:var(--surface-soft);color:var(--text);border:1px solid var(--border);border-radius:12px;font-size:15px;outline:none}
.lpa-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(211,166,71,0.22)}
.lpa-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px 20px;border:none;border-radius:999px;background:linear-gradient(180deg,var(--terracotta),var(--terracotta-deep));color:var(--on-terracotta);font-weight:700;font-size:15px;cursor:pointer}
.lpa-btn:disabled{opacity:.6;cursor:wait}
.lpa-btn--ghost{background:transparent;border:1px solid var(--border);color:var(--muted)}
.lpa-login-err{margin:12px 0 0;font-size:13px;color:#F0A; color:var(--terracotta);font-weight:600;min-height:18px}

/* ── Shell ── */
.lpa-shell{min-height:100vh;display:flex;flex-direction:column}
.lpa-top{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 18px;border-bottom:1px solid var(--border-soft);background:var(--surface)}
.lpa-brand{display:flex;align-items:center;gap:10px;min-width:0}
.lpa-title{font-family:var(--font-display);font-size:22px;color:var(--text-strong);line-height:1;white-space:nowrap}
.lpa-sub{font-size:11px;color:var(--muted);letter-spacing:.04em}
.lpa-top-actions{display:flex;align-items:center;gap:8px}
.lpa-iconbtn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 12px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer}
.lpa-iconbtn:hover{color:var(--text);border-color:var(--gold)}
.lpa-hamburger{display:none;align-items:center;gap:8px;padding:8px 13px;border-radius:11px;border:1px solid var(--border);background:var(--surface-soft);color:var(--text);font-size:14px;font-weight:700;font-family:inherit;cursor:pointer}
.lpa-hamburger:hover{border-color:var(--gold)}
.lpa-tabs{display:flex;flex-wrap:wrap;align-items:center;gap:6px 12px;padding:10px 14px;border-bottom:1px solid var(--border-soft);background:var(--surface-soft)}
/* Mobile: collapse the section nav behind the hamburger (drops down when open) */
@media (max-width:760px){
  .lpa-hamburger{display:inline-flex}
  .lpa-brand-text{display:none}
  .lpa-top{padding:12px 14px}
  .lpa-top-actions{gap:6px}
  .lpa-tabs{display:none;flex-direction:column;align-items:stretch;gap:4px;padding:10px 12px}
  .lpa-tabs.is-open{display:flex}
  .lpa-nav-progress{order:-1;margin-bottom:4px}
  .lpa-nav-group{flex-direction:column;align-items:stretch;width:100%;gap:3px;padding:6px 0;border-top:1px solid var(--border-soft)}
  .lpa-nav-grouplabel{margin:0 0 2px}
  .lpa-tab{width:100%;justify-content:flex-start;padding:11px 12px}
  /* Cards: let right-side actions wrap below instead of clipping off-screen */
  .lpa-row{flex-wrap:wrap}
  .lpa-row-actions{width:100%;justify-content:flex-end;margin-top:8px}
  .lpa-rule-card{flex-wrap:wrap}
  .lpa-rule-controls{flex-direction:row;width:100%;justify-content:flex-end;align-items:center;margin-top:8px}
  .lpa-body{padding:14px 12px 40px}
}
.lpa-nav-progress{flex-basis:100%;font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--soft)}
.lpa-nav-group{display:inline-flex;flex-wrap:wrap;align-items:center;gap:5px}
.lpa-nav-grouplabel{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--soft);margin-right:1px;opacity:.8}
.lpa-dot-st{width:7px;height:7px;border-radius:50%;flex:0 0 auto}
.lpa-dot-live{background:var(--green)}
.lpa-dot-building{background:var(--gold)}
.lpa-dot-planned{background:var(--soft);opacity:.5}
.lpa-tab .lpa-dot-st{margin-right:1px}
/* planned placeholder */
.lpa-planned{max-width:560px;margin:24px auto;padding:26px 24px;border:1px solid var(--border-soft);border-radius:16px;background:var(--surface);text-align:center}
.lpa-planned-badges{display:flex;justify-content:center;gap:8px;margin-bottom:14px}
.lpa-planned-status{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:4px 11px;border-radius:999px}
.lpa-planned-status.is-building{background:rgba(211,166,71,.18);color:var(--gold-deep)}
.lpa-planned-status.is-planned{background:var(--surface-deep);color:var(--muted)}
.lpa-planned-pri{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:4px 11px;border-radius:999px;background:var(--surface-soft);color:var(--soft);border:1px solid var(--border-soft)}
.lpa-planned-title{font-family:var(--font-display);font-size:30px;color:var(--text-strong);margin:0 0 10px}
.lpa-planned-desc{font-size:14.5px;color:var(--text);line-height:1.6;margin:0 0 16px}
.lpa-planned-note{font-size:12.5px;color:var(--muted);font-style:italic;margin:0}
.lpa-tab{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border:none;border-radius:11px;background:transparent;color:var(--muted);font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap}
.lpa-tab:hover{color:var(--text)}
.lpa-tab.is-active{background:var(--surface-deep);color:var(--terracotta)}
.lpa-badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;border-radius:9px;background:var(--terracotta);color:#fff;font-size:11px;font-weight:700}
.lpa-body{flex:1;width:100%;max-width:760px;margin:0 auto;padding:16px 14px 48px}
.lpa-loading,.lpa-empty{text-align:center;color:var(--muted);padding:48px 20px}
.lpa-empty-sub{font-size:12.5px;max-width:340px;margin:6px auto 0}

/* ── shared chips ── */
.lpa-flag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;background:var(--terracotta);color:#fff;font-size:11px;font-weight:700}
.lpa-spin{animation:lpa-spin .7s linear infinite}@keyframes lpa-spin{to{transform:rotate(360deg)}}

/* ── Chat CRM (Glenn's lp-crm, site palette) ── */
.lpa-crm-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:10px;flex-wrap:wrap}
.lpa-filter{display:inline-flex;align-items:center;gap:6px;padding:8px 13px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:13px;font-weight:600;cursor:pointer}
.lpa-filter.is-active{background:var(--terracotta);border-color:var(--terracotta);color:#fff}
.lpa-count{font-size:12.5px;color:var(--muted)}
.lpa-list{display:flex;flex-direction:column;gap:8px}
.lpa-row{display:flex;align-items:flex-start;gap:10px;padding:12px 13px;border-radius:13px;border:1px solid var(--border-soft);background:var(--surface);cursor:pointer}
.lpa-row:hover{border-color:var(--gold)}
.lpa-row.is-unread{background:var(--surface-soft)}
.lpa-row.is-flagged{border-left:3px solid var(--terracotta)}
.lpa-dot{flex:0 0 auto;width:9px;height:9px;border-radius:50%;margin-top:5px;background:transparent;border:1px solid var(--border)}
.lpa-dot.is-unread{background:var(--terracotta);border-color:var(--terracotta)}
.lpa-row-main{flex:1;min-width:0}
.lpa-row-top{display:flex;align-items:center;gap:8px;margin-bottom:3px;flex-wrap:wrap}
.lpa-row-date{font-weight:700;font-size:13px;color:var(--text-strong)}
.lpa-row-time{font-size:12px;color:var(--muted)}
.lpa-row-preview{font-size:13px;color:var(--muted);line-height:1.4;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.lpa-row-actions{flex:0 0 auto;align-self:center;display:flex;gap:6px}
.lpa-mini{padding:6px 10px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.lpa-mini:hover{color:var(--text);border-color:var(--gold)}
.lpa-mini--danger:hover{color:#fff;border-color:var(--terracotta);background:var(--terracotta)}

/* transcript */
.lpa-thread-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.lpa-back{display:inline-flex;align-items:center;gap:5px;padding:7px 11px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13px;font-weight:600;cursor:pointer}
.lpa-thread-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.lpa-thread-date{font-size:12.5px;color:var(--muted)}
.lpa-transcript{display:flex;flex-direction:column;gap:10px}
.lpa-msg{max-width:86%;padding:10px 13px;border-radius:14px}
.lpa-msg.is-user{align-self:flex-end;background:var(--terracotta);color:#fff;border-bottom-right-radius:5px}
.lpa-msg.is-assistant{align-self:flex-start;background:var(--surface);border:1px solid var(--border-soft);border-bottom-left-radius:5px}
.lpa-msg.is-feedback{align-self:stretch;max-width:100%;background:var(--surface-soft);border:1px dashed var(--terracotta)}
.lpa-msg.is-feedback .lpa-msg-role{color:var(--terracotta);opacity:1}
.lpa-msg-role{display:block;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;opacity:.7;margin-bottom:3px}
.lpa-msg p{margin:0;font-size:13.5px;line-height:1.5;white-space:pre-wrap;word-break:break-word}

/* ── Feedback CRM (Glenn's lpf-crm, site palette) ── */
.lpa-fb-toolbar{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
.lpa-fb-locs{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px}
.lpa-fb-loc{flex:0 0 auto;padding:8px 13px;border-radius:999px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-weight:700;font-size:12.5px;cursor:pointer;white-space:nowrap}
.lpa-fb-loc.is-active{background:var(--gold);color:var(--on-gold);border-color:transparent}
.lpa-fb-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.lpa-fb-card.is-flagged{border-color:var(--terracotta)}
.lpa-fb-head{width:100%;display:flex;align-items:center;gap:10px;padding:12px 14px;background:none;border:none;cursor:pointer;text-align:left}
.lpa-fb-stars{display:inline-flex;gap:1px;color:var(--gold);flex-shrink:0}
.lpa-fb-meta{display:flex;flex-direction:column;min-width:0;flex:1}
.lpa-fb-name{font-weight:700;font-size:14px;color:var(--text-strong)}
.lpa-fb-when{font-size:11.5px;color:var(--muted)}
.lpa-fb-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:999px;background:rgba(212,90,53,.18);color:var(--terracotta);font-size:10.5px;font-weight:800;flex-shrink:0}
.lpa-fb-chev{color:var(--muted);transition:transform .16s ease;flex-shrink:0}
.lpa-fb-chev.is-open{transform:rotate(180deg)}
.lpa-fb-detail{padding:0 14px 14px;border-top:1px solid var(--border-soft)}
.lpa-fb-subratings{display:flex;flex-wrap:wrap;gap:6px;margin:12px 0}
.lpa-fb-sub{font-size:11.5px;padding:4px 9px;border-radius:999px;background:var(--surface-soft);color:var(--text);border:1px solid var(--border-soft)}
.lpa-fb-comments{font-size:14px;line-height:1.6;color:var(--text);white-space:pre-wrap;margin:10px 0 0}
.lpa-fb-comments em{color:var(--muted)}
.lpa-fb-contact{font-size:12.5px;color:var(--muted);margin:10px 0 0}
.lpa-fb-followups{margin:12px 0 0;padding:10px 12px;border-radius:10px;background:var(--surface-soft);border:1px solid var(--border-soft)}
.lpa-fb-followups-label{display:block;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:6px}
.lpa-fb-followup{font-size:13px;line-height:1.5;margin:0 0 6px}
.lpa-fb-detail-actions{display:flex;gap:8px;margin-top:14px}

/* ── shared form bits ── */
.lpa-fg{margin-bottom:14px}
.lpa-fg label{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--soft);margin-bottom:6px}
.lpa-fg input,.lpa-fg textarea{width:100%;padding:11px 13px;background:var(--surface-soft);color:var(--text);border:1px solid var(--border);border-radius:11px;font-size:14px;font-family:inherit;outline:none}
.lpa-fg input:focus,.lpa-fg textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(211,166,71,.18)}
.lpa-fg textarea{resize:vertical;line-height:1.5}
.lpa-form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:6px}
.lpa-btn-sm{display:inline-flex;align-items:center;gap:6px;padding:9px 15px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer}
.lpa-btn-primary{background:linear-gradient(180deg,var(--terracotta),var(--terracotta-deep));color:var(--on-terracotta)}
.lpa-btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted)}
.lpa-btn-ghost:hover{color:var(--text);border-color:var(--gold)}
.lpa-banner{padding:11px 13px;border-radius:11px;background:var(--surface-soft);border:1px solid var(--border-soft);font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:14px}
.lpa-err{padding:10px 13px;border-radius:11px;background:rgba(212,90,53,.14);border:1px solid var(--terracotta);color:var(--terracotta);font-size:13px;font-weight:600;margin-bottom:12px}
.lpa-iconbtn-sm{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer}
.lpa-iconbtn-sm:hover{color:var(--text);border-color:var(--gold)}
.lpa-iconbtn-sm.is-danger:hover{color:#fff;border-color:var(--terracotta);background:var(--terracotta)}

/* ── Training (Glenn's lp-train) ── */
.lpa-train{display:grid;grid-template-columns:1fr;gap:14px}
@media(min-width:680px){.lpa-train{grid-template-columns:180px 1fr}}
.lpa-train-rail{display:flex;flex-wrap:wrap;gap:6px}
@media(min-width:680px){.lpa-train-rail{flex-direction:column;flex-wrap:nowrap}}
.lpa-railbtn{display:inline-flex;align-items:center;gap:8px;padding:9px 12px;border-radius:10px;border:1px solid var(--border-soft);background:var(--surface);color:var(--muted);font-size:13.5px;font-weight:600;cursor:pointer;text-align:left;white-space:nowrap}
.lpa-railbtn:hover{color:var(--text)}
.lpa-railbtn.is-active{background:var(--surface-deep);color:var(--terracotta);border-color:var(--terracotta)}
.lpa-train-scopehead{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}
.lpa-train-scopetitle{font-family:var(--font-display);font-size:21px;color:var(--text-strong);margin:0}
.lpa-train-subnav{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.lpa-chip{display:inline-flex;align-items:center;gap:5px;padding:6px 11px;border-radius:999px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:12.5px;font-weight:600;cursor:pointer}
.lpa-chip.is-active{background:var(--gold);color:var(--on-gold);border-color:transparent}
.lpa-train-list{display:flex;flex-direction:column;gap:8px}
.lpa-train-card{display:flex;align-items:flex-start;gap:10px;padding:12px 13px;border-radius:12px;border:1px solid var(--border-soft);background:var(--surface)}
.lpa-train-card-main{flex:1;min-width:0}
.lpa-train-card-title{display:block;font-weight:700;font-size:14px;color:var(--text-strong);margin-bottom:3px}
.lpa-train-card-content{font-size:13px;color:var(--muted);line-height:1.5;white-space:pre-wrap;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}
.lpa-train-card-actions{flex:0 0 auto;display:flex;gap:6px}

/* ── Direct Links (Glenn's lp-dev / lp-links) ── */
.lpa-links-actions{display:flex;gap:8px;margin-bottom:14px}
.lpa-rule-card{display:flex;gap:10px;padding:13px;border-radius:12px;border:1px solid var(--border-soft);background:var(--surface);margin-bottom:8px}
.lpa-rule-card.is-disabled{opacity:.55}
.lpa-rule-main{flex:1;min-width:0}
.lpa-rule-head{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.lpa-rule-label{font-weight:700;font-size:14px;color:var(--text-strong)}
.lpa-status-tag{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:2px 8px;border-radius:999px;background:var(--surface-deep);color:var(--muted)}
.lpa-status-tag.is-active{background:rgba(95,174,126,.18);color:var(--green)}
.lpa-smart-pill{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:999px;background:rgba(211,166,71,.18);color:var(--gold-deep)}
.lpa-rule-meta{font-size:12.5px;color:var(--muted);line-height:1.5;word-break:break-word}
.lpa-rule-meta strong{color:var(--soft)}
.lpa-rule-controls{flex:0 0 auto;display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.lpa-reorder{display:flex;flex-direction:column;gap:2px}
.lpa-reorder button{width:28px;height:24px;display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--border);background:transparent;color:var(--muted);border-radius:7px;cursor:pointer}
.lpa-reorder button:disabled{opacity:.3;cursor:default}
.lpa-rule-mod{display:flex;gap:6px}
.lpa-toggle{display:inline-flex;align-items:center;gap:8px;padding:8px 0;background:none;border:none;color:var(--muted);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer}
.lpa-toggle .on{color:var(--green)}
.lpa-fg--check{display:flex;align-items:center}
.lpa-smartbox{margin-top:6px;padding:12px;border-radius:11px;border:1px solid var(--border-soft);background:var(--surface-soft)}
.lpa-smarthint{font-size:12px;color:var(--soft);margin:6px 0 0}
</style>
</head>
<body>

<!-- ====================== LOGIN ====================== -->
<div class="lpa-login" id="lpa-login" hidden>
  <form class="lpa-login-card" id="lpa-login-form">
    <svg class="lpa-login-mark" viewBox="0 0 44 44" width="44" height="44" aria-hidden="true">
      <defs>
        <linearGradient id="lpa-hm-bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FBE7BD"/><stop offset="100%" stop-color="#F0CF87"/></linearGradient>
        <linearGradient id="lpa-hm-sun" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F5BE3F"/><stop offset="100%" stop-color="#E07628"/></linearGradient>
      </defs>
      <circle cx="22" cy="22" r="22" fill="url(#lpa-hm-bg)"/>
      <g stroke="#C8801E" stroke-width="1.6" stroke-linecap="round" opacity="0.85">
        <line x1="22" y1="9" x2="22" y2="12.5"/><line x1="14" y1="13.5" x2="16.2" y2="15.7"/><line x1="30" y1="13.5" x2="27.8" y2="15.7"/><line x1="10.5" y1="20.5" x2="13.5" y2="20.5"/><line x1="33.5" y1="20.5" x2="30.5" y2="20.5"/>
      </g>
      <path d="M 14 24.5 a 8 8 0 0 1 16 0 z" fill="url(#lpa-hm-sun)"/>
      <path d="M 7.5 28.5 Q 22 33.5 36.5 28.5" stroke="#B23A14" stroke-width="2.2" fill="none" stroke-linecap="round"/>
      <path d="M 12 32.5 Q 22 35.5 32 32.5" stroke="#D88239" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    </svg>
    <p class="lpa-login-kicker">Las Palmas · Back Office</p>
    <h1 class="lpa-login-title">Staff Sign In</h1>
    <div class="lpa-login-field">
      <label for="lpa-pw">Password</label>
      <input id="lpa-pw" class="lpa-input" type="password" autocomplete="current-password" autofocus>
    </div>
    <button type="submit" class="lpa-btn" id="lpa-login-btn">Sign In</button>
    <p class="lpa-login-err" id="lpa-login-err" role="alert"></p>
  </form>
</div>

<!-- ====================== DASHBOARD ====================== -->
<div class="lpa-shell" id="lpa-shell" hidden>
  <header class="lpa-top">
    <div class="lpa-brand">
      <button type="button" class="lpa-hamburger" id="lpa-nav-toggle" aria-label="Open sections menu" aria-expanded="false">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" aria-hidden="true"><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
        <span id="lpa-current-label">Conversations</span>
      </button>
      <div class="lpa-brand-text">
        <div class="lpa-title">Las Palmas Back Office</div>
        <div class="lpa-sub">Conversations &amp; guest feedback</div>
      </div>
    </div>
    <div class="lpa-top-actions">
      <button type="button" class="lpa-iconbtn" id="lpa-refresh" aria-label="Refresh">Refresh</button>
      <button type="button" class="lpa-iconbtn" id="lpa-signout">Sign out</button>
    </div>
  </header>
  <nav class="lpa-tabs" id="lpa-tabs" aria-label="Back office sections"></nav>
  <main class="lpa-body">
    <div id="lpa-pane-chat"></div>
    <div id="lpa-pane-feedback" hidden></div>
    <div id="lpa-pane-training" hidden></div>
    <div id="lpa-pane-links" hidden></div>
    <div id="lpa-pane-terms" hidden></div>
    <div id="lpa-pane-events" hidden></div>
    <div id="lpa-pane-planned" hidden></div>
  </main>
</div>

<script>
(function () {
  var d = document, TOKEN_KEY = 'lp_admin_token';
  var token = null;
  try { token = sessionStorage.getItem(TOKEN_KEY); } catch (e) {}

  /* ── tiny icon helper ── */
  function svg(p, size, sw) {
    return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="' + (sw || 2.25) + '" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' + p + '</svg>';
  }
  var IC = {
    filter: '<polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>',
    flag: '<path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" x2="4" y1="22" y2="15"/>',
    chevL: '<path d="m15 18-6-6 6-6"/>',
    chevD: '<path d="m6 9 6 6 6-6"/>',
    inbox: '<polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/>',
    loader: '<path d="M21 12a9 9 0 1 1-6.219-8.56"/>',
    star: '<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>',
    alert: '<path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 20h16a2 2 0 0 0 1.73-2Z"/><path d="M12 9v4"/><path d="M12 17h.01"/>',
    plus: '<path d="M5 12h14"/><path d="M12 5v14"/>',
    edit: '<path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/>',
    trash: '<path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>',
    save: '<path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>',
    chevU: '<path d="m18 15-6-6-6 6"/>',
    pin: '<path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/>',
    globe: '<circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>',
    sparkle: '<path d="m12 3-1.9 5.8a2 2 0 0 1-1.3 1.3L3 12l5.8 1.9a2 2 0 0 1 1.3 1.3L12 21l1.9-5.8a2 2 0 0 1 1.3-1.3L21 12l-5.8-1.9a2 2 0 0 1-1.3-1.3Z"/>',
    toggleOn: '<rect x="1" y="5" width="22" height="14" rx="7"/><circle cx="16" cy="12" r="3" fill="currentColor"/>',
    toggleOff: '<rect x="1" y="5" width="22" height="14" rx="7"/><circle cx="8" cy="12" r="3" fill="currentColor"/>',
    brain: '<path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"/>',
  };
  /* Training categories (mirror seedTraining / _training.js order) */
  var TRAIN_CATS = [
    { id: 'identity', label: 'Identity / Persona', kind: 'flat' },
    { id: 'general', label: 'General Data', kind: 'flat' },
    { id: 'guardrails', label: 'Guardrails', kind: 'flat' },
    { id: 'voice', label: 'Brand Voice', kind: 'flat' },
    { id: 'menus', label: 'Menus', kind: 'flat' },
    { id: 'location', label: 'Location Specific', kind: 'location' },
    { id: 'seasonal', label: 'Temporary / Seasonal', kind: 'seasonal' },
  ];
  var TRAIN_LOCS = ['Shorter', 'Riverside', 'Cartersville', 'Rockmart'];
  var TRAIN_SEASONS = ['All Locations'].concat(TRAIN_LOCS);

  var loginView = d.getElementById('lpa-login');
  var shellView = d.getElementById('lpa-shell');

  /* ── auth ── */
  function showLogin() { shellView.hidden = true; loginView.hidden = false; setTimeout(function(){ d.getElementById('lpa-pw').focus(); }, 30); }
  function showShell() { loginView.hidden = true; shellView.hidden = false; renderNav(); loadAll(); }

  function adminFetch(path, opts) {
    opts = opts || {};
    opts.headers = Object.assign({ 'Content-Type': 'application/json' }, opts.headers || {}, token ? { Authorization: 'Bearer ' + token } : {});
    return fetch(path, opts).then(function (r) {
      if (r.status === 401) { token = null; try { sessionStorage.removeItem(TOKEN_KEY); } catch (e) {} showLogin(); throw new Error('unauthorized'); }
      return r;
    });
  }

  d.getElementById('lpa-login-form').addEventListener('submit', function (e) {
    e.preventDefault();
    var btn = d.getElementById('lpa-login-btn');
    var err = d.getElementById('lpa-login-err');
    var pw = d.getElementById('lpa-pw').value;
    err.textContent = '';
    btn.disabled = true; btn.textContent = 'Signing in…';
    fetch('/api/admin/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: pw }) })
      .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
      .then(function (res) {
        if (res.ok && res.j.token) {
          token = res.j.token;
          try { sessionStorage.setItem(TOKEN_KEY, token); } catch (e) {}
          d.getElementById('lpa-pw').value = '';
          showShell();
        } else {
          err.textContent = res.j && res.j.error === 'auth_not_configured' ? 'Back office not configured yet.' : 'Incorrect password.';
        }
      })
      .catch(function () { err.textContent = 'Could not reach the server. Try again.'; })
      .then(function () { btn.disabled = false; btn.textContent = 'Sign In'; });
  });

  d.getElementById('lpa-nav-toggle').addEventListener('click', function () {
    var nav = d.getElementById('lpa-tabs');
    var open = nav.classList.toggle('is-open');
    this.setAttribute('aria-expanded', String(open));
  });
  d.getElementById('lpa-signout').addEventListener('click', function () {
    adminFetch('/api/admin/session', { method: 'DELETE' }).catch(function () {});
    token = null; try { sessionStorage.removeItem(TOKEN_KEY); } catch (e) {}
    showLogin();
  });
  d.getElementById('lpa-refresh').addEventListener('click', loadAll);

  /* ── tabs ── */
  /* ── Full back-office map — single source of the entire build scope ── */
  var TABS = [
    { group: 'Inboxes', id: 'chat', label: 'Conversations', status: 'live' },
    { group: 'Inboxes', id: 'feedback', label: 'Feedback', status: 'live' },
    { group: 'Inboxes', id: 'applications', label: 'Applications', status: 'planned', priority: 'Gap',
      desc: 'Job applications from the Join Our Team form. The form currently doesn\'t submit anywhere — this needs a backend that routes each application to the right location\'s hiring contact.' },
    { group: 'Assistant', id: 'training', label: 'Training', status: 'live' },
    { group: 'Assistant', id: 'links', label: 'Direct Links', status: 'live' },
    { group: 'Site content', id: 'terms', label: 'Terms', status: 'live' },
    { group: 'Site content', id: 'events', label: 'Events', status: 'live' },
    { group: 'Site content', id: 'specials', label: 'Daily Specials', status: 'planned', priority: 'High',
      desc: 'Edit the per-day daily specials shown on /specials/ and the location pages.' },
    { group: 'Site content', id: 'menu', label: 'Menu', status: 'planned', priority: 'High',
      desc: 'Edit menu categories, items, and prices on /menu/. Also where AI menu search gets turned on.' },
    { group: 'Site content', id: 'hours', label: 'Hours', status: 'planned', priority: 'High',
      desc: 'Edit each location\'s hours (regular and holiday) shown on /locations/ and the location pages.' },
    { group: 'Site content', id: 'homepage', label: 'Homepage', status: 'planned', priority: 'Medium',
      desc: 'Edit homepage sections, popups, the intro animation, and legal content.' },
    { group: 'Site content', id: 'locpages', label: 'Location Pages', status: 'planned', priority: 'Low',
      desc: 'Per-location page content: intro, specials, details, and menu — for all four locations.' },
    { group: 'Site content', id: 'catering', label: 'Catering', status: 'planned', priority: 'Low',
      desc: 'Edit the catering page content sections.' },
    { group: 'Site content', id: 'fbform', label: 'Feedback Form', status: 'planned', priority: 'Optional',
      desc: 'Reshape the guest feedback form — add, rename, or remove rating categories and questions. Deferred for now; we\'ll build it if we decide there\'s a real need.' },
  ];
  var BUILT = { chat: 1, feedback: 1, training: 1, links: 1, terms: 1, events: 1 };
  var tab = 'chat';
  var loadedOnce = {};

  function renderNav() {
    var nav = d.getElementById('lpa-tabs');
    var groups = [];
    TABS.forEach(function (t) { if (groups.indexOf(t.group) < 0) groups.push(t.group); });
    var liveN = TABS.filter(function (t) { return t.status === 'live'; }).length;
    var html = '<div class="lpa-nav-progress">' + liveN + ' of ' + TABS.length + ' sections live</div>';
    groups.forEach(function (g) {
      html += '<div class="lpa-nav-group"><span class="lpa-nav-grouplabel">' + g + '</span>';
      TABS.filter(function (t) { return t.group === g; }).forEach(function (t) {
        var badge = t.id === 'chat' ? ' <span class="lpa-badge" id="lpa-chat-badge" hidden>0</span>'
          : t.id === 'feedback' ? ' <span class="lpa-badge" id="lpa-fb-badge" hidden>0</span>' : '';
        html += '<button type="button" class="lpa-tab ' + (t.id === tab ? 'is-active' : '') + '" data-tab="' + t.id + '">' +
          '<span class="lpa-dot-st lpa-dot-' + t.status + '"></span>' + t.label + badge + '</button>';
      });
      html += '</div>';
    });
    nav.innerHTML = html;
    nav.querySelectorAll('.lpa-tab').forEach(function (b) {
      b.addEventListener('click', function () { switchTab(b.getAttribute('data-tab')); });
    });
  }

  function switchTab(id) {
    tab = id;
    d.querySelectorAll('.lpa-tab').forEach(function (x) { x.classList.toggle('is-active', x.getAttribute('data-tab') === id); });
    var def = TABS.filter(function (t) { return t.id === id; })[0];
    var lbl = d.getElementById('lpa-current-label'); if (lbl && def) lbl.textContent = def.label;
    d.getElementById('lpa-tabs').classList.remove('is-open'); // close mobile drawer on select
    d.getElementById('lpa-nav-toggle').setAttribute('aria-expanded', 'false');
    var built = !!BUILT[id];
    ['chat', 'feedback', 'training', 'links', 'terms', 'events'].forEach(function (t) { d.getElementById('lpa-pane-' + t).hidden = !(built && t === id); });
    d.getElementById('lpa-pane-planned').hidden = built;
    if (built) {
      if (id === 'training' && !loadedOnce.training) { loadedOnce.training = true; loadTraining(); }
      if (id === 'links' && !loadedOnce.links) { loadedOnce.links = true; loadLinks(); }
      if (id === 'terms' && !loadedOnce.terms) { loadedOnce.terms = true; loadTerms(); }
      if (id === 'events' && !loadedOnce.events) { loadedOnce.events = true; loadEvents(); }
    } else {
      renderPlanned(id);
    }
  }

  function renderPlanned(id) {
    var t = TABS.filter(function (x) { return x.id === id; })[0];
    var statusLabel = t.status === 'building' ? 'Building now' : 'Planned';
    d.getElementById('lpa-pane-planned').innerHTML =
      '<div class="lpa-planned"><div class="lpa-planned-badges">' +
      '<span class="lpa-planned-status is-' + t.status + '">' + statusLabel + '</span>' +
      '<span class="lpa-planned-pri">' + t.priority + '</span></div>' +
      '<h2 class="lpa-planned-title">' + t.label + '</h2>' +
      '<p class="lpa-planned-desc">' + t.desc + '</p>' +
      '<p class="lpa-planned-note">Captured in the build plan — filling in tab by tab, in priority order.</p></div>';
  }

  /* ── date helpers ── */
  function fmtDate(iso) { try { return new Date(iso).toLocaleDateString([], { month: 'short', day: 'numeric' }); } catch (e) { return ''; } }
  function fmtTime(iso) { try { return new Date(iso).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' }); } catch (e) { return ''; } }
  function fmtFull(iso) { try { return new Date(iso).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' }); } catch (e) { return ''; } }
  function esc(s) { var t = d.createElement('span'); t.textContent = s == null ? '' : String(s); return t.innerHTML; }

  /* ============================ CHAT CRM ============================ */
  var chatThreads = [], chatFilterFlagged = false, openThreadId = null;
  var paneChat = d.getElementById('lpa-pane-chat');

  function renderChat() {
    var sorted = chatThreads.slice().sort(function (a, b) { return new Date(b.lastAt) - new Date(a.lastAt); });
    var open = openThreadId ? sorted.filter(function (t) { return t.id === openThreadId; })[0] : null;
    var flaggedN = chatThreads.filter(function (t) { return t.flagged; }).length;
    var badge = d.getElementById('lpa-chat-badge');
    badge.hidden = flaggedN === 0; badge.textContent = flaggedN;

    if (open) { renderTranscript(open); return; }

    var visible = chatFilterFlagged ? sorted.filter(function (t) { return t.flagged; }) : sorted;
    var html = '<div class="lpa-crm-toolbar">' +
      '<button type="button" class="lpa-filter ' + (chatFilterFlagged ? 'is-active' : '') + '" id="lpa-chat-filter">' + svg(IC.filter, 14) + '<span>' + (chatFilterFlagged ? 'Showing flagged' : 'Filter flagged') + '</span></button>' +
      '<span class="lpa-count">' + visible.length + ' ' + (visible.length === 1 ? 'conversation' : 'conversations') + '</span></div>';

    if (!visible.length) {
      html += '<div class="lpa-empty">' + svg(IC.inbox, 26) + '<p>' + (chatFilterFlagged ? 'No flagged conversations.' : 'No conversations yet.') + '</p>' +
        '<p class="lpa-empty-sub">Guest chats from the assistant appear here, newest first.</p></div>';
      paneChat.innerHTML = html;
      d.getElementById('lpa-chat-filter').addEventListener('click', function () { chatFilterFlagged = !chatFilterFlagged; renderChat(); });
      return;
    }

    html += '<div class="lpa-list">';
    visible.forEach(function (t) {
      var preview = (t.messages[0] && t.messages[0].text) || '(empty)';
      html += '<div class="lpa-row ' + (t.read ? '' : 'is-unread') + ' ' + (t.flagged ? 'is-flagged' : '') + '" data-id="' + esc(t.id) + '">' +
        '<span class="lpa-dot ' + (t.read ? '' : 'is-unread') + '"></span>' +
        '<div class="lpa-row-main"><div class="lpa-row-top">' +
        '<span class="lpa-row-date">' + fmtDate(t.lastAt) + '</span><span class="lpa-row-time">' + fmtTime(t.lastAt) + '</span>' +
        (t.flagged ? '<span class="lpa-flag">' + svg(IC.flag, 11) + esc(t.flagReason || 'Flagged') + '</span>' : '') +
        '</div><p class="lpa-row-preview">' + esc(preview) + '</p></div>' +
        '<div class="lpa-row-actions">' +
        '<button type="button" class="lpa-mini" data-act="read" data-id="' + esc(t.id) + '">' + (t.read ? 'Mark unread' : 'Mark read') + '</button>' +
        '<button type="button" class="lpa-mini lpa-mini--danger" data-act="del" data-id="' + esc(t.id) + '">Delete</button>' +
        '</div></div>';
    });
    html += '</div>';
    paneChat.innerHTML = html;

    d.getElementById('lpa-chat-filter').addEventListener('click', function () { chatFilterFlagged = !chatFilterFlagged; renderChat(); });
    paneChat.querySelectorAll('.lpa-row').forEach(function (row) {
      row.addEventListener('click', function (e) {
        if (e.target.closest('.lpa-mini')) return;
        var id = row.getAttribute('data-id');
        openThreadId = id;
        var t = chatThreads.filter(function (x) { return x.id === id; })[0];
        if (t && !t.read) { t.read = true; patchThread(id, { read: true }); }
        renderChat();
      });
    });
    paneChat.querySelectorAll('[data-act="read"]').forEach(function (b) {
      b.addEventListener('click', function (e) {
        e.stopPropagation();
        var id = b.getAttribute('data-id');
        var t = chatThreads.filter(function (x) { return x.id === id; })[0];
        t.read = !t.read; patchThread(id, { read: t.read }); renderChat();
      });
    });
    paneChat.querySelectorAll('[data-act="del"]').forEach(function (b) {
      b.addEventListener('click', function (e) {
        e.stopPropagation();
        var id = b.getAttribute('data-id');
        if (!confirm('Delete this conversation permanently?')) return;
        chatThreads = chatThreads.filter(function (x) { return x.id !== id; });
        adminFetch('/api/admin/chat-thread', { method: 'DELETE', body: JSON.stringify({ id: id }) }).catch(function () {});
        renderChat();
      });
    });
  }

  function renderTranscript(t) {
    var html = '<div class="lpa-thread-head">' +
      '<button type="button" class="lpa-back" id="lpa-thread-back">' + svg(IC.chevL, 16) + '<span>All conversations</span></button>' +
      '<div class="lpa-thread-meta">' +
      (t.flagged ? '<span class="lpa-flag">' + svg(IC.flag, 12) + esc(t.flagReason || 'Flagged') + '</span><button type="button" class="lpa-mini" id="lpa-thread-unflag">Clear flag</button>' : '') +
      '<span class="lpa-thread-date">' + fmtDate(t.startedAt) + ' · ' + fmtTime(t.startedAt) + '</span>' +
      '</div></div><div class="lpa-transcript">';
    t.messages.forEach(function (m) {
      var cls = m.role === 'user' ? 'is-user' : m.role === 'feedback' ? 'is-feedback' : 'is-assistant';
      var role = m.role === 'user' ? 'Guest' : m.role === 'feedback' ? 'Guest feedback (thumbs down)' : 'Assistant';
      html += '<div class="lpa-msg ' + cls + '"><span class="lpa-msg-role">' + role + '</span><p>' + esc(m.text) + '</p></div>';
    });
    html += '</div>';
    paneChat.innerHTML = html;
    d.getElementById('lpa-thread-back').addEventListener('click', function () { openThreadId = null; renderChat(); });
    var unflag = d.getElementById('lpa-thread-unflag');
    if (unflag) unflag.addEventListener('click', function () {
      t.flagged = false; t.flagReason = ''; patchThread(t.id, { flagged: false }); renderChat();
    });
  }

  function patchThread(id, patch) {
    patch.id = id;
    adminFetch('/api/admin/chat-thread', { method: 'PATCH', body: JSON.stringify(patch) }).catch(function () {});
  }

  /* ============================ FEEDBACK CRM ============================ */
  var fbRecords = [], fbLoc = 'All', fbFlaggedOnly = false, fbOpenId = null;
  var LOCS = ['Shorter', 'Riverside', 'Rockmart', 'Cartersville'];
  var paneFb = d.getElementById('lpa-pane-feedback');

  function renderFeedback() {
    var flaggedN = fbRecords.filter(function (r) { return r.concern; }).length;
    var badge = d.getElementById('lpa-fb-badge');
    badge.hidden = flaggedN === 0; badge.textContent = flaggedN;

    var filtered = fbRecords.filter(function (r) {
      if (fbLoc !== 'All' && r.location !== fbLoc) return false;
      if (fbFlaggedOnly && !r.concern) return false;
      return true;
    });

    var html = '<div class="lpa-fb-toolbar"><div class="lpa-fb-locs">';
    ['All'].concat(LOCS).forEach(function (l) {
      html += '<button type="button" class="lpa-fb-loc ' + (fbLoc === l ? 'is-active' : '') + '" data-loc="' + l + '">' + l + '</button>';
    });
    html += '</div><button type="button" class="lpa-filter ' + (fbFlaggedOnly ? 'is-active' : '') + '" id="lpa-fb-filter">' + svg(IC.filter, 14) + ' Flagged only' + (flaggedN ? ' (' + flaggedN + ')' : '') + '</button></div>';

    if (!filtered.length) {
      html += '<p class="lpa-empty">No feedback yet' + (fbLoc !== 'All' ? ' for ' + fbLoc : '') + (fbFlaggedOnly ? ' that was flagged' : '') + '.</p>';
      paneFb.innerHTML = html;
      bindFbToolbar();
      return;
    }

    html += '<div class="lpa-list">';
    filtered.forEach(function (r) {
      var open = fbOpenId === r.id;
      var stars = '';
      for (var n = 1; n <= 5; n++) stars += '<span style="opacity:' + (n <= r.overallRating ? 1 : 0.25) + '">' + svg(IC.star, 14, 2).replace('fill="none"', n <= r.overallRating ? 'fill="currentColor"' : 'fill="none"') + '</span>';
      html += '<div class="lpa-fb-card ' + (r.concern ? 'is-flagged' : '') + '">' +
        '<button type="button" class="lpa-fb-head" data-id="' + esc(r.id) + '">' +
        '<span class="lpa-fb-stars">' + stars + '</span>' +
        '<span class="lpa-fb-meta"><span class="lpa-fb-name">' + esc(r.guestName || 'Anonymous') + '</span>' +
        '<span class="lpa-fb-when">' + fmtFull(r.submittedAt) + ' · ' + fmtTime(r.submittedAt) + ' · ' + esc(r.location || '—') + '</span></span>' +
        (r.concern ? '<span class="lpa-fb-badge">' + svg(IC.alert, 12) + ' Flagged</span>' : '') +
        '<span class="lpa-fb-chev ' + (open ? 'is-open' : '') + '">' + svg(IC.chevD, 16) + '</span></button>';
      if (open) {
        html += '<div class="lpa-fb-detail">';
        if (r.ratings && r.ratings.length) {
          html += '<div class="lpa-fb-subratings">';
          r.ratings.forEach(function (rt) { html += '<span class="lpa-fb-sub">' + esc(rt.label) + ': ' + (rt.value || '—') + (rt.value ? '★' : '') + '</span>'; });
          html += '</div>';
        }
        html += '<p class="lpa-fb-comments">' + (r.comments ? esc(r.comments) : '<em>No written comments.</em>') + '</p>';
        if (r.phone || r.serverName) {
          html += '<p class="lpa-fb-contact">' + (r.serverName ? 'Server: ' + esc(r.serverName) : '') + (r.serverName && r.phone ? ' · ' : '') + (r.phone ? 'Phone: ' + esc(r.phone) : '') + (r.permissionPublic ? ' · ✔ OK to share publicly' : '') + '</p>';
        }
        if (r.followups && r.followups.length) {
          html += '<div class="lpa-fb-followups"><span class="lpa-fb-followups-label">Guest replies to the AI follow-up</span>';
          r.followups.forEach(function (f) { html += '<p class="lpa-fb-followup">' + esc(f.text || f) + '</p>'; });
          html += '</div>';
        }
        html += '<div class="lpa-fb-detail-actions">' +
          '<button type="button" class="lpa-mini" data-fbact="flag" data-id="' + esc(r.id) + '">' + (r.concern ? 'Clear flag' : 'Flag for review') + '</button>' +
          '<button type="button" class="lpa-mini lpa-mini--danger" data-fbact="del" data-id="' + esc(r.id) + '">Delete</button>' +
          '</div>';
        html += '</div>';
      }
      html += '</div>';
    });
    html += '</div>';
    paneFb.innerHTML = html;
    bindFbToolbar();

    paneFb.querySelectorAll('.lpa-fb-head').forEach(function (b) {
      b.addEventListener('click', function () { var id = b.getAttribute('data-id'); fbOpenId = fbOpenId === id ? null : id; renderFeedback(); });
    });
    paneFb.querySelectorAll('[data-fbact="flag"]').forEach(function (b) {
      b.addEventListener('click', function () {
        var id = b.getAttribute('data-id');
        var r = fbRecords.filter(function (x) { return x.id === id; })[0];
        r.concern = !r.concern;
        adminFetch('/api/admin/feedback-record', { method: 'PATCH', body: JSON.stringify({ id: id, concern: r.concern }) }).catch(function () {});
        renderFeedback();
      });
    });
    paneFb.querySelectorAll('[data-fbact="del"]').forEach(function (b) {
      b.addEventListener('click', function () {
        var id = b.getAttribute('data-id');
        if (!confirm('Delete this feedback permanently?')) return;
        fbRecords = fbRecords.filter(function (x) { return x.id !== id; });
        adminFetch('/api/admin/feedback-record', { method: 'DELETE', body: JSON.stringify({ id: id }) }).catch(function () {});
        renderFeedback();
      });
    });
  }

  function bindFbToolbar() {
    paneFb.querySelectorAll('.lpa-fb-loc').forEach(function (b) {
      b.addEventListener('click', function () { fbLoc = b.getAttribute('data-loc'); renderFeedback(); });
    });
    var f = d.getElementById('lpa-fb-filter');
    if (f) f.addEventListener('click', function () { fbFlaggedOnly = !fbFlaggedOnly; renderFeedback(); });
  }

  /* ============================ TRAINING EDITOR ============================ */
  var trainEntries = [], trainCat = 'identity', trainLoc = TRAIN_LOCS[0], trainSeason = TRAIN_SEASONS[0], trainEditing = null;
  var paneTraining = d.getElementById('lpa-pane-training');

  function trainScope() {
    var c = catDef(trainCat);
    if (c.kind === 'location') return trainLoc;
    if (c.kind === 'seasonal') return trainSeason;
    return '';
  }
  function catDef(id) { return TRAIN_CATS.filter(function (c) { return c.id === id; })[0]; }
  function trainBucket() {
    var scope = trainScope();
    return trainEntries.filter(function (e) { return e.category === trainCat && (e.scope || '') === scope; })
      .sort(function (a, b) { return a.sortOrder - b.sortOrder; });
  }

  function renderTraining() {
    var c = catDef(trainCat);
    var scopeLabel = c.kind === 'location' ? c.label + ' — ' + trainLoc : c.kind === 'seasonal' ? c.label + ' — ' + trainSeason : c.label;
    var html = '<div class="lpa-train"><aside class="lpa-train-rail">';
    TRAIN_CATS.forEach(function (cc) {
      html += '<button type="button" class="lpa-railbtn ' + (trainCat === cc.id ? 'is-active' : '') + '" data-cat="' + cc.id + '">' +
        svg(IC.brain, 15) + '<span>' + cc.label + '</span></button>';
    });
    html += '</aside><section class="lpa-train-main">';
    html += '<div class="lpa-train-scopehead"><h3 class="lpa-train-scopetitle">' + esc(scopeLabel) + '</h3>' +
      (trainEditing ? '' : '<button type="button" class="lpa-btn-sm lpa-btn-primary" id="lpa-train-add">' + svg(IC.plus, 14) + '<span>Add Entry</span></button>') + '</div>';

    if (c.kind === 'location') {
      html += '<div class="lpa-train-subnav">';
      TRAIN_LOCS.forEach(function (l) { html += '<button type="button" class="lpa-chip ' + (trainLoc === l ? 'is-active' : '') + '" data-loc="' + l + '">' + svg(IC.pin, 12) + l + '</button>'; });
      html += '</div>';
    } else if (c.kind === 'seasonal') {
      html += '<div class="lpa-train-subnav">';
      TRAIN_SEASONS.forEach(function (s) { html += '<button type="button" class="lpa-chip ' + (trainSeason === s ? 'is-active' : '') + '" data-season="' + esc(s) + '">' + svg(s === 'All Locations' ? IC.globe : IC.pin, 12) + esc(s) + '</button>'; });
      html += '</div>';
    }

    if (trainEditing) {
      html += '<div class="lpa-train-form">' +
        '<div class="lpa-fg"><label>Title / label</label><input type="text" maxlength="80" id="lpa-train-title" value="' + esc(trainEditing.title) + '" placeholder="e.g. Hours, House margarita, Allergy policy…"></div>' +
        '<div class="lpa-fg"><label>Content (this feeds the assistant\'s system prompt)</label><textarea id="lpa-train-content" rows="8" placeholder="Write the source-of-truth information for this entry…">' + esc(trainEditing.content) + '</textarea></div>' +
        '<div class="lpa-form-actions"><button type="button" class="lpa-btn-sm lpa-btn-ghost" id="lpa-train-cancel">Cancel</button>' +
        '<button type="button" class="lpa-btn-sm lpa-btn-primary" id="lpa-train-save">' + svg(IC.save, 14) + '<span>Save Entry</span></button></div></div>';
    } else {
      var bucket = trainBucket();
      if (!bucket.length) {
        html += '<div class="lpa-empty">' + svg(IC.brain, 26) + '<p>No entries yet in <strong>' + esc(scopeLabel) + '</strong>.</p>' +
          '<p class="lpa-empty-sub">Add entries here and they become part of the assistant\'s knowledge — changes go live on the next message.</p></div>';
      } else {
        html += '<div class="lpa-train-list">';
        bucket.forEach(function (e) {
          html += '<div class="lpa-train-card"><div class="lpa-train-card-main">' +
            '<span class="lpa-train-card-title">' + esc(e.title || 'Untitled') + '</span>' +
            '<p class="lpa-train-card-content">' + (e.content ? esc(e.content) : '<em>(empty)</em>') + '</p></div>' +
            '<div class="lpa-train-card-actions">' +
            '<button type="button" class="lpa-iconbtn-sm" data-edit="' + esc(e.id) + '" aria-label="Edit entry">' + svg(IC.edit, 15) + '</button>' +
            '<button type="button" class="lpa-iconbtn-sm is-danger" data-del="' + esc(e.id) + '" aria-label="Delete entry">' + svg(IC.trash, 15) + '</button></div></div>';
        });
        html += '</div>';
      }
    }
    html += '</section></div>';
    paneTraining.innerHTML = html;

    paneTraining.querySelectorAll('[data-cat]').forEach(function (b) { b.addEventListener('click', function () { trainCat = b.getAttribute('data-cat'); trainEditing = null; renderTraining(); }); });
    paneTraining.querySelectorAll('[data-loc]').forEach(function (b) { b.addEventListener('click', function () { trainLoc = b.getAttribute('data-loc'); trainEditing = null; renderTraining(); }); });
    paneTraining.querySelectorAll('[data-season]').forEach(function (b) { b.addEventListener('click', function () { trainSeason = b.getAttribute('data-season'); trainEditing = null; renderTraining(); }); });
    var addBtn = d.getElementById('lpa-train-add');
    if (addBtn) addBtn.addEventListener('click', function () { trainEditing = { id: '', title: '', content: '', isNew: true }; renderTraining(); });
    paneTraining.querySelectorAll('[data-edit]').forEach(function (b) {
      b.addEventListener('click', function () { var e = trainEntries.filter(function (x) { return x.id === b.getAttribute('data-edit'); })[0]; trainEditing = { id: e.id, title: e.title, content: e.content, isNew: false }; renderTraining(); });
    });
    paneTraining.querySelectorAll('[data-del]').forEach(function (b) {
      b.addEventListener('click', function () {
        var id = b.getAttribute('data-del');
        if (!confirm('Delete this training entry? This changes what the assistant knows.')) return;
        trainEntries = trainEntries.filter(function (x) { return x.id !== id; });
        adminFetch('/api/admin/training', { method: 'DELETE', body: JSON.stringify({ id: id }) }).catch(function () {});
        renderTraining();
      });
    });
    if (trainEditing) {
      d.getElementById('lpa-train-cancel').addEventListener('click', function () { trainEditing = null; renderTraining(); });
      d.getElementById('lpa-train-save').addEventListener('click', saveTrainEntry);
      d.getElementById('lpa-train-title').focus();
    }
  }

  function saveTrainEntry() {
    var title = d.getElementById('lpa-train-title').value.trim();
    var content = d.getElementById('lpa-train-content').value.trim();
    if (!title && !content) { trainEditing = null; renderTraining(); return; }
    if (trainEditing.isNew) {
      var payload = { category: trainCat, scope: trainScope(), title: title || 'Untitled', content: content };
      adminFetch('/api/admin/training', { method: 'POST', body: JSON.stringify(payload) })
        .then(function (r) { return r.json(); })
        .then(function (res) { loadTraining(); }).catch(function () {});
    } else {
      var id = trainEditing.id;
      trainEntries = trainEntries.map(function (e) { return e.id === id ? Object.assign({}, e, { title: title || 'Untitled', content: content }) : e; });
      adminFetch('/api/admin/training', { method: 'PATCH', body: JSON.stringify({ id: id, title: title || 'Untitled', content: content }) }).catch(function () {});
    }
    trainEditing = null; renderTraining();
  }

  function loadTraining() {
    paneTraining.innerHTML = '<div class="lpa-loading">' + svg(IC.loader, 22, 2.5).replace('<svg', '<svg class="lpa-spin"') + '<p>Loading training…</p></div>';
    adminFetch('/api/admin/training').then(function (r) { return r.json(); }).then(function (j) {
      trainEntries = j.entries || []; renderTraining();
    }).catch(function () {});
  }

  /* ============================ DIRECT LINKS EDITOR ============================ */
  var ctaRules = [], ctaEditing = null, ctaErr = '';
  var paneLinks = d.getElementById('lpa-pane-links');

  function renderLinks() {
    var html = '<p class="lpa-banner">Keyword match fires instantly. Turn on <strong>Smart</strong> to let the model surface a card from intent (e.g. a guest says <em>"I\'d like to get that"</em> → Ready to order). Cards are detected server-side and shown in chat.</p>';
    if (!ctaEditing) {
      html += '<div class="lpa-links-actions"><button type="button" class="lpa-btn-sm lpa-btn-primary" id="lpa-cta-add">' + svg(IC.plus, 15) + '<span>Add New Link</span></button></div>';
      ctaRules.forEach(function (r, idx) {
        html += '<div class="lpa-rule-card ' + (r.enabled ? '' : 'is-disabled') + '"><div class="lpa-rule-main">' +
          '<div class="lpa-rule-head"><span class="lpa-rule-label">' + esc(r.label || 'Untitled Link') + '</span>' +
          '<span class="lpa-status-tag ' + (r.enabled ? 'is-active' : '') + '">' + (r.enabled ? 'Active' : 'Disabled') + '</span>' +
          (r.smart ? '<span class="lpa-smart-pill">' + svg(IC.sparkle, 11) + 'Smart</span>' : '') + '</div>' +
          '<div class="lpa-rule-meta"><strong>Keywords:</strong> ' + esc(r.keywords.join(', ') || 'none') + '</div>' +
          '<div class="lpa-rule-meta"><strong>Destination:</strong> ' + esc(r.url) + '</div>' +
          '<button type="button" class="lpa-toggle" data-smart="' + esc(r.id) + '">' + svg(r.smart ? IC.toggleOn : IC.toggleOff, 22).replace('<svg', '<svg class="' + (r.smart ? 'on' : '') + '"') + '<span>Smart intent matching ' + (r.smart ? 'on' : 'off') + '</span></button>' +
          '</div><div class="lpa-rule-controls"><div class="lpa-reorder">' +
          '<button type="button" data-up="' + idx + '"' + (idx === 0 ? ' disabled' : '') + ' aria-label="Move up">' + svg(IC.chevU, 16) + '</button>' +
          '<button type="button" data-down="' + idx + '"' + (idx === ctaRules.length - 1 ? ' disabled' : '') + ' aria-label="Move down">' + svg(IC.chevD, 16) + '</button></div>' +
          '<div class="lpa-rule-mod"><button type="button" class="lpa-iconbtn-sm" data-edit="' + esc(r.id) + '" aria-label="Edit link">' + svg(IC.edit, 15) + '</button>' +
          '<button type="button" class="lpa-iconbtn-sm is-danger" data-del="' + esc(r.id) + '" aria-label="Delete link">' + svg(IC.trash, 15) + '</button></div></div></div>';
      });
    } else {
      var e = ctaEditing;
      html += '<div class="lpa-rule-form"><h3 class="lpa-train-scopetitle" style="margin-bottom:12px">' + (e.isNew ? 'Create New Link' : 'Edit: ' + esc(e.label)) + '</h3>';
      if (ctaErr) html += '<div class="lpa-err">' + esc(ctaErr) + '</div>';
      html += fg('Internal Label (max 40)', '<input type="text" maxlength="40" id="lpa-cta-label" value="' + esc(e.label) + '">');
      html += fg('Keywords (comma separated, max 32 each)', '<input type="text" id="lpa-cta-kw" placeholder="e.g. order, pickup, delivery" value="' + esc((e.keywords || []).join(', ')) + '">');
      html += fg('Card Title (max 60)', '<input type="text" maxlength="60" id="lpa-cta-title" value="' + esc(e.title) + '">');
      html += fg('Card Description / Body (max 120)', '<input type="text" maxlength="120" id="lpa-cta-body" value="' + esc(e.body) + '">');
      html += fg('Button Text (max 28)', '<input type="text" maxlength="28" id="lpa-cta-btn" value="' + esc(e.buttonText) + '">');
      html += fg('Destination URL (max 300; http(s):// or /path)', '<input type="text" maxlength="300" id="lpa-cta-url" value="' + esc(e.url) + '">');
      html += '<div class="lpa-fg lpa-fg--check"><button type="button" class="lpa-toggle" id="lpa-cta-enabled">' + svg(e.enabled ? IC.toggleOn : IC.toggleOff, 26).replace('<svg', '<svg class="' + (e.enabled ? 'on' : '') + '"') + '<span>Enabled</span></button></div>';
      html += '<div class="lpa-smartbox"><button type="button" class="lpa-toggle" id="lpa-cta-smart">' + svg(e.smart ? IC.toggleOn : IC.toggleOff, 26).replace('<svg', '<svg class="' + (e.smart ? 'on' : '') + '"') + '<span>' + svg(IC.sparkle, 13) + ' Smart intent matching</span></button>';
      if (e.smart) html += '<div class="lpa-fg" style="margin-top:10px"><label>Extra instructions (optional) — when should the model surface this?</label><textarea id="lpa-cta-smartinstr" rows="3" placeholder="e.g. Surface when the guest expresses intent to buy a specific menu item.">' + esc(e.smartInstructions || '') + '</textarea><p class="lpa-smarthint">If blank, the model uses the keywords above as the intent hint.</p></div>';
      html += '</div><div class="lpa-form-actions"><button type="button" class="lpa-btn-sm lpa-btn-ghost" id="lpa-cta-cancel">Cancel</button><button type="button" class="lpa-btn-sm lpa-btn-primary" id="lpa-cta-save">Save Changes</button></div></div>';
    }
    paneLinks.innerHTML = html;
    bindLinks();
  }

  function fg(label, inner) { return '<div class="lpa-fg"><label>' + label + '</label>' + inner + '</div>'; }

  function bindLinks() {
    var add = d.getElementById('lpa-cta-add');
    if (add) add.addEventListener('click', function () { ctaErr = ''; ctaEditing = { id: '', label: '', keywords: [], title: '', body: '', buttonText: '', url: '', enabled: true, smart: false, smartInstructions: '', isNew: true }; renderLinks(); });
    paneLinks.querySelectorAll('[data-smart]').forEach(function (b) {
      b.addEventListener('click', function () {
        var id = b.getAttribute('data-smart'); var r = ctaRules.filter(function (x) { return x.id === id; })[0];
        r.smart = !r.smart; adminFetch('/api/admin/cta', { method: 'PATCH', body: JSON.stringify({ id: id, smart: r.smart }) }).catch(function () {}); renderLinks();
      });
    });
    paneLinks.querySelectorAll('[data-up]').forEach(function (b) { b.addEventListener('click', function () { moveRule(+b.getAttribute('data-up'), -1); }); });
    paneLinks.querySelectorAll('[data-down]').forEach(function (b) { b.addEventListener('click', function () { moveRule(+b.getAttribute('data-down'), 1); }); });
    paneLinks.querySelectorAll('[data-edit]').forEach(function (b) {
      b.addEventListener('click', function () { ctaErr = ''; var r = ctaRules.filter(function (x) { return x.id === b.getAttribute('data-edit'); })[0]; ctaEditing = Object.assign({}, r, { isNew: false }); renderLinks(); });
    });
    paneLinks.querySelectorAll('[data-del]').forEach(function (b) {
      b.addEventListener('click', function () {
        var id = b.getAttribute('data-del');
        if (!confirm('Delete this Direct Link?')) return;
        ctaRules = ctaRules.filter(function (x) { return x.id !== id; });
        adminFetch('/api/admin/cta', { method: 'DELETE', body: JSON.stringify({ id: id }) }).catch(function () {}); renderLinks();
      });
    });
    var en = d.getElementById('lpa-cta-enabled'); if (en) en.addEventListener('click', function () { ctaEditing.enabled = !ctaEditing.enabled; renderLinks(); });
    var sm = d.getElementById('lpa-cta-smart'); if (sm) sm.addEventListener('click', function () { syncCtaForm(); ctaEditing.smart = !ctaEditing.smart; renderLinks(); });
    var cancel = d.getElementById('lpa-cta-cancel'); if (cancel) cancel.addEventListener('click', function () { ctaEditing = null; ctaErr = ''; renderLinks(); });
    var save = d.getElementById('lpa-cta-save'); if (save) save.addEventListener('click', saveRule);
  }

  function syncCtaForm() {
    if (!ctaEditing) return;
    ctaEditing.label = d.getElementById('lpa-cta-label').value;
    ctaEditing.keywords = d.getElementById('lpa-cta-kw').value.split(',').map(function (k) { return k.trim(); }).filter(function (k, i, a) { return k && a.indexOf(k) === i; });
    ctaEditing.title = d.getElementById('lpa-cta-title').value;
    ctaEditing.body = d.getElementById('lpa-cta-body').value;
    ctaEditing.buttonText = d.getElementById('lpa-cta-btn').value;
    ctaEditing.url = d.getElementById('lpa-cta-url').value;
    var si = d.getElementById('lpa-cta-smartinstr'); if (si) ctaEditing.smartInstructions = si.value;
  }

  function moveRule(i, dir) {
    var j = i + dir; if (j < 0 || j >= ctaRules.length) return;
    var a = ctaRules[i], b = ctaRules[j];
    ctaRules[i] = b; ctaRules[j] = a;
    // persist swapped sort orders
    adminFetch('/api/admin/cta', { method: 'PATCH', body: JSON.stringify({ id: a.id, sortOrder: j }) }).catch(function () {});
    adminFetch('/api/admin/cta', { method: 'PATCH', body: JSON.stringify({ id: b.id, sortOrder: i }) }).catch(function () {});
    a.sortOrder = j; b.sortOrder = i;
    renderLinks();
  }

  function saveRule() {
    syncCtaForm();
    var e = ctaEditing;
    if (!e.label.trim() || !e.title.trim() || !e.body.trim() || !e.buttonText.trim() || !e.url.trim() || !e.keywords.length) {
      ctaErr = 'All fields are required and need at least one keyword.'; renderLinks(); return;
    }
    if (!/^(https?:\/\/|\/)/i.test(e.url.trim())) { ctaErr = 'URL must start with http://, https://, or a relative path /.'; renderLinks(); return; }
    ctaErr = '';
    var payload = { label: e.label.trim(), keywords: e.keywords, title: e.title.trim(), body: e.body.trim(), buttonText: e.buttonText.trim(), url: e.url.trim(), enabled: e.enabled, smart: e.smart, smartInstructions: e.smartInstructions || '' };
    if (e.isNew) {
      adminFetch('/api/admin/cta', { method: 'POST', body: JSON.stringify(payload) }).then(function () { loadLinks(); }).catch(function () {});
    } else {
      payload.id = e.id;
      adminFetch('/api/admin/cta', { method: 'PATCH', body: JSON.stringify(payload) }).catch(function () {});
      ctaRules = ctaRules.map(function (r) { return r.id === e.id ? Object.assign({}, r, payload) : r; });
    }
    ctaEditing = null; renderLinks();
  }

  function loadLinks() {
    paneLinks.innerHTML = '<div class="lpa-loading">' + svg(IC.loader, 22, 2.5).replace('<svg', '<svg class="lpa-spin"') + '<p>Loading Direct Links…</p></div>';
    adminFetch('/api/admin/cta').then(function (r) { return r.json(); }).then(function (j) {
      ctaRules = j.rules || []; renderLinks();
    }).catch(function () {});
  }

  /* ============================ TERMS EDITOR ============================ */
  var terms = { chat: { content: '', updatedAt: null }, feedback: { content: '', updatedAt: null } };
  var termsSurface = 'chat';
  var paneTerms = d.getElementById('lpa-pane-terms');

  function renderTerms() {
    var t = terms[termsSurface] || { content: '', updatedAt: null };
    var dateStr = '';
    try { if (t.updatedAt) dateStr = new Date(t.updatedAt).toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' }); } catch (e) {}
    var html = '<div class="lpa-fb-toolbar"><div class="lpa-fb-locs">' +
      '<button type="button" class="lpa-fb-loc ' + (termsSurface === 'chat' ? 'is-active' : '') + '" data-surface="chat">Chat assistant terms</button>' +
      '<button type="button" class="lpa-fb-loc ' + (termsSurface === 'feedback' ? 'is-active' : '') + '" data-surface="feedback">Feedback portal terms</button>' +
      '</div></div>' +
      '<p class="lpa-banner">Edit the Terms of Use shown to guests on the ' + (termsSurface === 'chat' ? 'chat assistant' : 'feedback portal') + '. Markdown supported: <strong>## heading</strong>, <strong>### subheading</strong>, <strong>- bullet</strong>, <strong>**bold**</strong>. Saving stamps today\'s date automatically.</p>' +
      '<div class="lpa-fg"><textarea id="lpa-terms-text" rows="20" spellcheck="true">' + esc(t.content) + '</textarea></div>' +
      '<div class="lpa-form-actions" style="justify-content:space-between;align-items:center">' +
      '<span class="lpa-fb-when" id="lpa-terms-date">' + (dateStr ? 'Last saved ' + dateStr : 'Not saved yet') + '</span>' +
      '<button type="button" class="lpa-btn-sm lpa-btn-primary" id="lpa-terms-save">' + svg(IC.save, 14) + '<span>Save changes</span></button></div>';
    paneTerms.innerHTML = html;
    paneTerms.querySelectorAll('[data-surface]').forEach(function (b) {
      b.addEventListener('click', function () { terms[termsSurface].content = d.getElementById('lpa-terms-text').value; termsSurface = b.getAttribute('data-surface'); renderTerms(); });
    });
    d.getElementById('lpa-terms-save').addEventListener('click', function () {
      var content = d.getElementById('lpa-terms-text').value;
      terms[termsSurface].content = content;
      var btn = d.getElementById('lpa-terms-save');
      btn.disabled = true; btn.querySelector('span').textContent = 'Saving…';
      adminFetch('/api/admin/terms', { method: 'PATCH', body: JSON.stringify({ surface: termsSurface, content: content }) })
        .then(function (r) { return r.json(); })
        .then(function (res) {
          if (res.updatedAt) terms[termsSurface].updatedAt = res.updatedAt;
          btn.disabled = false; btn.querySelector('span').textContent = 'Saved';
          var ds = ''; try { ds = new Date(res.updatedAt).toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' }); } catch (e) {}
          d.getElementById('lpa-terms-date').textContent = ds ? 'Last saved ' + ds : '';
          setTimeout(function () { if (btn.querySelector('span')) btn.querySelector('span').textContent = 'Save changes'; }, 1600);
        })
        .catch(function () { btn.disabled = false; btn.querySelector('span').textContent = 'Save changes'; });
    });
  }

  function loadTerms() {
    paneTerms.innerHTML = '<div class="lpa-loading">' + svg(IC.loader, 22, 2.5).replace('<svg', '<svg class="lpa-spin"') + '<p>Loading terms…</p></div>';
    adminFetch('/api/admin/terms').then(function (r) { return r.json(); }).then(function (j) {
      if (j.terms) { terms.chat = j.terms.chat || terms.chat; terms.feedback = j.terms.feedback || terms.feedback; }
      renderTerms();
    }).catch(function () {});
  }

  /* ============================ EVENTS EDITOR ============================ */
  var events = [], evEditing = null, evErr = '';
  var EV_LOCS = ['Shorter', 'Riverside', 'Cartersville', 'Rockmart'];
  var paneEvents = d.getElementById('lpa-pane-events');

  function evDateLabel(ymd) {
    try { var p = ymd.split('-'); return new Date(p[0], p[1] - 1, p[2]).toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' }); } catch (e) { return ymd; }
  }
  function isPast(ymd) { return ymd < new Date().toISOString().slice(0, 10); }

  function renderEvents() {
    if (evEditing) { renderEventForm(); return; }
    var html = '<div class="lpa-links-actions"><button type="button" class="lpa-btn-sm lpa-btn-primary" id="lpa-ev-add">' + svg(IC.plus, 15) + '<span>Add Event</span></button></div>';
    if (!events.length) {
      html += '<div class="lpa-empty">' + svg(IC.alert, 26) + '<p>No events yet.</p><p class="lpa-empty-sub">Add one and it appears on /events/ immediately (today onward).</p></div>';
    } else {
      html += '<div class="lpa-list">';
      events.forEach(function (ev) {
        var locs = (ev.locations && ev.locations.length) ? ev.locations.join(', ') : 'All locations';
        html += '<div class="lpa-rule-card ' + (isPast(ev.date) ? 'is-disabled' : '') + '"><div class="lpa-rule-main">' +
          '<div class="lpa-rule-head"><span class="lpa-rule-label">' + esc(ev.title) + '</span>' +
          (isPast(ev.date) ? '<span class="lpa-status-tag">Past</span>' : '<span class="lpa-status-tag is-active">Upcoming</span>') + '</div>' +
          '<div class="lpa-rule-meta"><strong>' + evDateLabel(ev.date) + '</strong> · ' + esc(locs) + '</div>' +
          '<div class="lpa-rule-meta">' + esc((ev.description || '').slice(0, 120)) + ((ev.description || '').length > 120 ? '…' : '') + '</div></div>' +
          '<div class="lpa-rule-controls"><div class="lpa-rule-mod">' +
          '<button type="button" class="lpa-iconbtn-sm" data-edit="' + esc(ev.id) + '" aria-label="Edit event">' + svg(IC.edit, 15) + '</button>' +
          '<button type="button" class="lpa-iconbtn-sm is-danger" data-del="' + esc(ev.id) + '" aria-label="Delete event">' + svg(IC.trash, 15) + '</button></div></div></div>';
      });
      html += '</div>';
    }
    paneEvents.innerHTML = html;
    var add = d.getElementById('lpa-ev-add');
    if (add) add.addEventListener('click', function () { evErr = ''; evEditing = { id: '', date: '', title: '', description: '', locations: [], isNew: true }; renderEvents(); });
    paneEvents.querySelectorAll('[data-edit]').forEach(function (b) {
      b.addEventListener('click', function () { evErr = ''; var e = events.filter(function (x) { return x.id === b.getAttribute('data-edit'); })[0]; evEditing = Object.assign({}, e, { locations: (e.locations || []).slice(), isNew: false }); renderEvents(); });
    });
    paneEvents.querySelectorAll('[data-del]').forEach(function (b) {
      b.addEventListener('click', function () {
        var id = b.getAttribute('data-del');
        if (!confirm('Delete this event?')) return;
        events = events.filter(function (x) { return x.id !== id; });
        adminFetch('/api/admin/events', { method: 'DELETE', body: JSON.stringify({ id: id }) }).catch(function () {});
        renderEvents();
      });
    });
  }

  function renderEventForm() {
    var e = evEditing;
    var html = '<div class="lpa-rule-form"><h3 class="lpa-train-scopetitle" style="margin-bottom:12px">' + (e.isNew ? 'New Event' : 'Edit Event') + '</h3>';
    if (evErr) html += '<div class="lpa-err">' + esc(evErr) + '</div>';
    html += fg('Date', '<input type="date" id="lpa-ev-date" value="' + esc(e.date) + '">');
    html += fg('Title', '<input type="text" maxlength="120" id="lpa-ev-title" value="' + esc(e.title) + '" placeholder="e.g. Cinco de Mayo Fiesta">');
    html += fg('Description', '<textarea id="lpa-ev-desc" rows="4" maxlength="1000" placeholder="What\'s happening, specials, times…">' + esc(e.description) + '</textarea>');
    html += '<div class="lpa-fg"><label>Locations <span style="text-transform:none;letter-spacing:0;color:var(--soft)">(none = all four)</span></label><div class="lpa-train-subnav" id="lpa-ev-locs">';
    EV_LOCS.forEach(function (l) {
      var on = e.locations.indexOf(l) >= 0;
      html += '<button type="button" class="lpa-chip ' + (on ? 'is-active' : '') + '" data-loc="' + l + '">' + svg(IC.pin, 12) + l + '</button>';
    });
    html += '</div></div>';
    html += '<div class="lpa-form-actions"><button type="button" class="lpa-btn-sm lpa-btn-ghost" id="lpa-ev-cancel">Cancel</button><button type="button" class="lpa-btn-sm lpa-btn-primary" id="lpa-ev-save">Save Event</button></div></div>';
    paneEvents.innerHTML = html;
    paneEvents.querySelectorAll('#lpa-ev-locs .lpa-chip').forEach(function (b) {
      b.addEventListener('click', function () {
        var l = b.getAttribute('data-loc'); var i = evEditing.locations.indexOf(l);
        if (i >= 0) evEditing.locations.splice(i, 1); else evEditing.locations.push(l);
        b.classList.toggle('is-active');
      });
    });
    d.getElementById('lpa-ev-cancel').addEventListener('click', function () { evEditing = null; evErr = ''; renderEvents(); });
    d.getElementById('lpa-ev-save').addEventListener('click', saveEvent);
  }

  function saveEvent() {
    var date = d.getElementById('lpa-ev-date').value;
    var title = d.getElementById('lpa-ev-title').value.trim();
    var description = d.getElementById('lpa-ev-desc').value;
    if (!/^\d{4}-\d{2}-\d{2}$/.test(date)) { evErr = 'Please pick a date.'; renderEventForm(); return; }
    if (!title) { evErr = 'Please enter a title.'; renderEventForm(); return; }
    evErr = '';
    var payload = { date: date, title: title, description: description, locations: evEditing.locations };
    if (evEditing.isNew) {
      adminFetch('/api/admin/events', { method: 'POST', body: JSON.stringify(payload) }).then(function () { loadEvents(); }).catch(function () {});
    } else {
      payload.id = evEditing.id;
      adminFetch('/api/admin/events', { method: 'PATCH', body: JSON.stringify(payload) }).catch(function () {});
      events = events.map(function (x) { return x.id === evEditing.id ? Object.assign({}, x, payload) : x; });
    }
    evEditing = null; renderEvents();
  }

  function loadEvents() {
    paneEvents.innerHTML = '<div class="lpa-loading">' + svg(IC.loader, 22, 2.5).replace('<svg', '<svg class="lpa-spin"') + '<p>Loading events…</p></div>';
    adminFetch('/api/admin/events').then(function (r) { return r.json(); }).then(function (j) { events = j.events || []; renderEvents(); }).catch(function () {});
  }

  /* ============================ LOAD ============================ */
  function loadAll() {
    paneChat.innerHTML = '<div class="lpa-loading">' + svg(IC.loader, 22, 2.5).replace('<svg', '<svg class="lpa-spin"') + '<p>Loading conversations…</p></div>';
    adminFetch('/api/admin/chat-threads').then(function (r) { return r.json(); }).then(function (j) {
      chatThreads = j.threads || []; openThreadId = null; renderChat();
    }).catch(function () {});
    adminFetch('/api/admin/feedback-records').then(function (r) { return r.json(); }).then(function (j) {
      fbRecords = j.records || []; renderFeedback();
    }).catch(function () {});
    loadedOnce = {}; // Training/Links re-fetch on next open
  }

  /* ── boot ── */
  if (token) {
    adminFetch('/api/admin/session').then(function (r) { return r.json(); }).then(function (j) {
      if (j.valid) showShell(); else showLogin();
    }).catch(function () { showLogin(); });
  } else {
    showLogin();
  }
})();
</script>
</body>
</html>
